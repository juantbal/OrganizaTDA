<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrganizaTDA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f14;
      --sidebar: #1a1a2e;
      --text: #e0e0e0;
      --muted: #7a7a9a;
      --accent: #e8824a;
      --accent-dark: #d2693a;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --accent-glow: rgba(232,130,74,0.18);
      --accent-border: rgba(232,130,74,0.25);
      --sidebar-w: 62px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
    }

    .app {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0 20px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.15rem;
      color: #fff;
      flex-shrink: 0;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(232,130,74,0.3);
    }

    .nav-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .nav-btn {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 13px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, color 0.18s;
      position: relative;
    }

    .nav-btn:hover:not(.disabled) {
      background: rgba(255,255,255,0.07);
      color: var(--text);
    }

    .nav-btn.active {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .nav-btn.disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    .nav-btn svg {
      width: 19px;
      height: 19px;
      stroke-width: 1.8;
    }

    .nav-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%);
      background: #12121c;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      border: 1px solid rgba(255,255,255,0.09);
      z-index: 100;
    }

    .nav-btn:hover::after { opacity: 1; }

    /* ─── CONTENT AREA ─── */
    .content {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .section {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 36px 40px 40px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .section.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .section-head {
      margin-bottom: 26px;
    }

    .section-head h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .section-head p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 3px;
    }

    /* ─── FORM ─── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--accent-border);
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 28px;
      display: grid;
      gap: 10px;
    }

    .form-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"],
    input[type="date"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px;
      color: var(--text);
      padding: 11px 14px;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"] { width: 100%; }
    input[type="date"] { flex: 1; min-width: 0; color-scheme: dark; }

    input::placeholder { color: rgba(224,224,224,0.3); }
    input:focus { border-color: rgba(232,130,74,0.45); }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5) sepia(0.3);
      cursor: pointer;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: none;
      border-radius: 11px;
      color: #fff;
      font-weight: 700;
      font-size: 0.88rem;
      font-family: inherit;
      padding: 11px 18px;
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.18s, transform 0.15s;
      flex-shrink: 0;
    }

    .primary-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 11px;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      font-family: inherit;
      padding: 11px 16px;
      cursor: pointer;
      transition: background 0.18s;
      flex-shrink: 0;
    }

    .secondary-btn:hover { background: rgba(255,255,255,0.11); }

    /* ─── TASK GROUPS ─── */
    .group-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin: 22px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .group-label.urgent { color: var(--accent); }

    .group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    .task-list { display: grid; gap: 7px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 15px;
      border-radius: 13px;
      background: var(--card);
      border: 1px solid var(--card-border);
      transition: border-color 0.18s;
    }

    .task-item.urgent-task {
      border-color: rgba(232,130,74,0.28);
      background: rgba(232,130,74,0.05);
    }

    .task-item:hover { border-color: rgba(255,255,255,0.14); }

    .task-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }

    .task-check:hover { border-color: var(--accent); }

    .task-check.done {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-check.done::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 0.93rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }

    .task-title.done-text {
      text-decoration: line-through;
      color: rgba(224,224,224,0.35);
    }

    .task-date {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .task-date.urgent { color: var(--accent); }

    .del-btn {
      background: none;
      border: none;
      color: rgba(224,224,224,0.2);
      cursor: pointer;
      padding: 5px;
      border-radius: 8px;
      transition: color 0.18s, background 0.18s;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .del-btn:hover {
      color: #ff7070;
      background: rgba(255,112,112,0.1);
    }

    .del-btn svg { width: 15px; height: 15px; stroke-width: 1.8; }

    .empty-state {
      padding: 32px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      border: 1px dashed rgba(255,255,255,0.09);
      border-radius: 14px;
    }

    /* ─── FOCUS SECTION ─── */
    .focus-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .focus-card {
      background: var(--card);
      border: 1px solid var(--accent-border);
      border-radius: 22px;
      padding: 30px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 0 60px rgba(232,130,74,0.06);
    }

    .focus-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .focus-task-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      word-break: break-word;
    }

    .focus-task-date {
      font-size: 0.82rem;
      margin-top: 10px;
    }

    .focus-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    /* ─── DUMP SECTION ─── */
    .dump-surface {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 22px 24px;
    }

    .dump-ta {
      width: 100%;
      min-height: 62vh;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.85;
      resize: none;
      caret-color: var(--accent);
    }

    .dump-ta::placeholder { color: rgba(224,224,224,0.2); }

    /* ─── POMODORO TIMER ─── */
    .pomo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding-bottom: 32px;
    }

    .pomo-presets {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pomo-preset-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .pomo-preset-btn:hover:not(:disabled) { background: rgba(255,255,255,0.09); color: var(--text); }

    .pomo-preset-btn.active {
      background: var(--accent-glow);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .pomo-preset-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .pomo-custom-input {
      width: 82px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      padding: 7px 14px;
      outline: none;
      text-align: center;
      transition: border-color 0.18s;
      -moz-appearance: textfield;
    }

    .pomo-custom-input:focus { border-color: rgba(232,130,74,0.45); }
    .pomo-custom-input::placeholder { color: rgba(224,224,224,0.28); }
    .pomo-custom-input::-webkit-inner-spin-button,
    .pomo-custom-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .pomo-ring-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pomo-ring {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .pomo-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 10; }

    .pomo-ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 552.92;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.9s linear;
      filter: drop-shadow(0 0 10px rgba(232,130,74,0.4));
    }

    .pomo-display {
      font-size: 3.6rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      z-index: 1;
      line-height: 1;
      user-select: none;
    }

    .pomo-finish-msg {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
      visibility: hidden;
      animation: pomoPulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes pomoPulse {
      from { opacity: 0.6; transform: scale(0.97); }
      to   { opacity: 1;   transform: scale(1.03); }
    }

    .pomo-controls { display: flex; gap: 10px; }

    .pomo-ctrl-btn { min-width: 100px; }

    .pomo-footer { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .pomo-count-display { font-size: 0.84rem; color: var(--muted); }
    .pomo-count-display strong { color: var(--accent); font-size: 1rem; font-weight: 700; }

    .pomo-notif-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-family: inherit;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .pomo-notif-btn:hover:not(:disabled) { color: var(--text); background: rgba(255,255,255,0.05); }
    .pomo-notif-btn.granted  { color: var(--accent); border-color: var(--accent-border); }
    .pomo-notif-btn.denied   { opacity: 0.42; cursor: not-allowed; }

    .focus-divider {
      width: 100%;
      max-width: 460px;
      margin: 0 auto 4px;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    /* ─── ENERGY WIDGET ─── */
    .energy-widget {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 20px;
      min-height: 50px;
      flex-wrap: wrap;
      transition: border-color 0.3s;
    }

    .energy-widget.energy-low    { border-color: rgba(220,80,80,0.32); }
    .energy-widget.energy-medium { border-color: rgba(220,180,40,0.32); }
    .energy-widget.energy-high   { border-color: rgba(60,200,100,0.32); }

    .energy-question {
      font-size: 0.83rem;
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .energy-options { display: flex; gap: 6px; flex-wrap: wrap; }

    .energy-opt-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      color: var(--text);
      font-size: 0.83rem;
      font-weight: 600;
      font-family: inherit;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .energy-opt-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    .energy-set-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .energy-set-value { font-size: 0.9rem; font-weight: 700; flex: 1; }

    .energy-change-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      color: var(--muted);
      font-size: 0.74rem;
      font-family: inherit;
      padding: 3px 9px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .energy-change-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }

    /* ─── FOCUS MODE ─── */
    .pomo-footer-btns {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .focus-mode-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-family: inherit;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .focus-mode-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    .focus-exit-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(26,26,46,0.92);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      padding: 10px 18px;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 7px;
      transition: background 0.18s, border-color 0.18s;
      z-index: 200;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .focus-exit-btn:hover {
      background: rgba(36,36,60,0.98);
      border-color: rgba(255,255,255,0.22);
    }

    .app.focus-mode .sidebar           { display: none; }
    .app.focus-mode #section-focus .section-head { display: none; }
    .app.focus-mode .focus-mode-btn    { display: none; }
    .app.focus-mode .focus-exit-btn    { display: flex; }

    /* ─── CALENDAR ─── */
    .cal-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .cal-toggle {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 3px;
      gap: 3px;
      flex-shrink: 0;
    }

    .cal-toggle-btn {
      background: transparent;
      border: none;
      border-radius: 9px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 600;
      font-family: inherit;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .cal-toggle-btn.active { background: var(--accent-glow); color: var(--accent); }
    .cal-toggle-btn:hover:not(.active) { color: var(--text); }

    .cal-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .cal-nav-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 9px;
      color: var(--text);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.18s;
      flex-shrink: 0;
    }

    .cal-nav-btn:hover { background: rgba(255,255,255,0.1); }

    .cal-nav-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      min-width: 160px;
      text-align: center;
      text-transform: capitalize;
    }

    .cal-today-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      padding: 6px 13px;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }

    .cal-today-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    /* weekly view */
    .cal-week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .cal-day-col {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 120px;
    }

    .cal-day-col.cal-today { border-color: var(--accent-border); background: var(--accent-glow); }

    .cal-day-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      margin-bottom: 8px;
    }

    .cal-day-name {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }

    .cal-day-col.cal-today .cal-day-name { color: var(--accent); }

    .cal-day-num {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .cal-day-col.cal-today .cal-day-num { color: var(--accent); }

    /* monthly view */
    .cal-month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
    }

    .cal-month-head {
      background: var(--sidebar);
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 8px 0;
    }

    .cal-month-cell {
      background: var(--bg);
      padding: 6px 6px 8px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .cal-month-cell.cal-other-month { background: rgba(15,15,20,0.55); }
    .cal-month-cell.cal-today { background: var(--accent-glow); }

    .cal-month-num {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 3px;
      line-height: 1;
    }

    .cal-month-cell.cal-today .cal-month-num { color: var(--accent); }
    .cal-month-cell.cal-other-month .cal-month-num { color: rgba(122,122,154,0.4); }

    /* chips */
    .cal-chip {
      background: var(--accent-glow);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 3px 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .cal-chip-done {
      background: rgba(255,255,255,0.03);
      border-color: var(--card-border);
      color: var(--muted);
      text-decoration: line-through;
    }

    .cal-chip-more {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      padding: 1px 4px;
    }

    /* ─── MOBILE BOTTOM BAR ─── */
    @media (max-width: 600px) {
      .app { flex-direction: column; }

      .sidebar {
        width: 100%;
        height: 58px;
        flex-direction: row;
        order: 2;
        border-right: none;
        border-top: 1px solid rgba(255,255,255,0.06);
        padding: 0 20px;
        justify-content: space-around;
        align-items: center;
        margin-bottom: env(safe-area-inset-bottom, 0px);
      }

      .logo { display: none; }

      .nav-items {
        flex-direction: row;
        gap: 0;
        flex: 1;
        justify-content: space-around;
      }

      .nav-btn::after { display: none; }

      .content { order: 1; }

      .section { padding: 22px 18px 28px; }

      .form-row { flex-wrap: wrap; }

      input[type="date"] { flex-basis: 100%; }

      .focus-card { padding: 22px 20px; }

      .focus-task-title { font-size: 1.1rem; }

      .pomo-ring-wrap { width: 190px; height: 190px; }

      .pomo-display { font-size: 2.8rem; }

      .energy-widget { gap: 8px; }

      .energy-question { font-size: 0.8rem; }

      .focus-exit-btn { bottom: 72px; right: 16px; padding: 9px 14px; }

      #calWeekView { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .cal-week-grid { grid-template-columns: repeat(7, minmax(88px, 1fr)); min-width: 620px; }
      .cal-nav-title { min-width: 130px; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ─── SIDEBAR ─── -->
    <nav class="sidebar">
      <div class="logo">O</div>
      <div class="nav-items">

        <button class="nav-btn active" data-section="tasks" data-tip="Tareas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/>
            <circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <button class="nav-btn" data-section="focus" data-tip="Foco">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <button class="nav-btn" data-section="dump" data-tip="Dump mental">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>

        <button class="nav-btn" data-section="calendar" data-tip="Calendario">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </button>

        <button class="nav-btn disabled" data-tip="Hábitos (próximamente)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </button>

      </div>
    </nav>

    <!-- ─── MAIN CONTENT ─── -->
    <main class="content">

      <!-- TAREAS -->
      <section id="section-tasks" class="section active">
        <div class="section-head">
          <h1>Tareas</h1>
          <p>Menos ruido, más acción.</p>
        </div>

        <div id="energyWidget" class="energy-widget"></div>

        <div class="form-card">
          <form id="taskForm" autocomplete="off">
            <input id="taskTitle" type="text" placeholder="¿Qué tienes que hacer?" required />
            <div class="form-row">
              <input id="taskDate" type="date" />
              <button type="submit" class="primary-btn">Añadir</button>
            </div>
          </form>
        </div>

        <div id="taskList"></div>
      </section>

      <!-- FOCO -->
      <section id="section-focus" class="section">
        <div class="section-head">
          <h1>Foco</h1>
          <p>Una sola cosa a la vez.</p>
        </div>

        <!-- Pomodoro Timer -->
        <div class="pomo-wrap">
          <div class="pomo-presets">
            <button class="pomo-preset-btn" data-min="15">15 min</button>
            <button class="pomo-preset-btn active" data-min="25">25 min</button>
            <button class="pomo-preset-btn" data-min="45">45 min</button>
            <input type="number" id="pomoCustom" class="pomo-custom-input" placeholder="min" min="1" max="999" />
          </div>

          <div class="pomo-ring-wrap">
            <svg class="pomo-ring" viewBox="0 0 200 200" aria-hidden="true">
              <circle class="pomo-ring-bg" cx="100" cy="100" r="88"/>
              <circle class="pomo-ring-progress" id="pomoProgress" cx="100" cy="100" r="88"/>
            </svg>
            <div class="pomo-display" id="pomoDisplay">25:00</div>
          </div>

          <div id="pomoMsg" class="pomo-finish-msg">¡Tiempo!</div>

          <div class="pomo-controls">
            <button id="pomoStart" class="primary-btn pomo-ctrl-btn">Iniciar</button>
            <button id="pomoPause" class="secondary-btn pomo-ctrl-btn">Pausar</button>
            <button id="pomoReset" class="secondary-btn pomo-ctrl-btn">Reiniciar</button>
          </div>

          <div class="pomo-footer">
            <div class="pomo-count-display">
              <strong id="pomoCountNum">0</strong> pomodoros completados hoy
            </div>
            <div class="pomo-footer-btns">
              <button id="pomoNotifBtn" class="pomo-notif-btn">Activar notificaciones</button>
              <button id="focusModeBtn" class="focus-mode-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="13" height="13" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                Modo focus
              </button>
            </div>
          </div>
        </div>

        <div class="focus-divider"></div>
        <div id="focusContent"></div>
      </section>

      <!-- DUMP MENTAL -->
      <section id="section-dump" class="section">
        <div class="section-head">
          <h1>Dump mental</h1>
          <p>Vacíalo todo. Se guarda automáticamente.</p>
        </div>
        <div class="dump-surface">
          <textarea id="brainDump" class="dump-ta" placeholder="Escribe sin estructura. Todo lo que tengas en la cabeza..."></textarea>
        </div>
      </section>

      <!-- CALENDARIO -->
      <section id="section-calendar" class="section">
        <div class="section-head">
          <h1>Calendario</h1>
          <p>Tus tareas con fecha, en su lugar.</p>
        </div>

        <div class="cal-controls">
          <div class="cal-toggle">
            <button class="cal-toggle-btn active" data-view="week">Semana</button>
            <button class="cal-toggle-btn" data-view="month">Mes</button>
          </div>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="calPrev">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="cal-nav-title" id="calTitle"></span>
            <button class="cal-nav-btn" id="calNext">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <button class="cal-today-btn" id="calToday">Hoy</button>
        </div>

        <div id="calWeekView"></div>
        <div id="calMonthView"></div>
      </section>

    </main>
    <button id="focusExitBtn" class="focus-exit-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
      Salir del foco
    </button>
  </div>

  <script>
    const STORAGE_TASKS = 'organizaTDA-tasks';
    const STORAGE_DUMP  = 'organizaTDA-dump';

    let tasks = [];
    let activeSection = 'tasks';

    /* ─── Navigation ─── */
    document.querySelectorAll('.nav-btn[data-section]').forEach(btn => {
      btn.addEventListener('click', () => switchSection(btn.dataset.section));
    });

    function switchSection(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('section-' + name).classList.add('active');
      document.querySelector(`.nav-btn[data-section="${name}"]`).classList.add('active');
      activeSection = name;
      if (name === 'focus') renderFocus();
      if (name === 'calendar') calRender();
    }

    /* ─── Storage ─── */
    function loadTasks() {
      try { tasks = JSON.parse(localStorage.getItem(STORAGE_TASKS)) || []; }
      catch { tasks = []; }
    }

    function saveTasks() { localStorage.setItem(STORAGE_TASKS, JSON.stringify(tasks)); }

    function loadDump() {
      document.getElementById('brainDump').value = localStorage.getItem(STORAGE_DUMP) || '';
    }

    /* ─── Date helpers ─── */
    function daysDiff(ds) {
      if (!ds) return null;
      const now = new Date(); now.setHours(0,0,0,0);
      return Math.ceil((new Date(ds + 'T00:00:00') - now) / 86400000);
    }

    function fmtDate(ds) {
      if (!ds) return null;
      return new Date(ds + 'T00:00:00').toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function taskGroup(task) {
      if (task.completed) return 'done';
      const d = daysDiff(task.dueDate);
      if (d === null) return 'later';
      if (d <= 0) return 'today';
      if (d <= 6) return 'week';
      return 'later';
    }

    function sortByDate(a, b) {
      if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
      if (a.dueDate) return -1;
      if (b.dueDate) return 1;
      return new Date(a.createdAt) - new Date(b.createdAt);
    }

    /* ─── Render task list ─── */
    function renderTasks() {
      const container = document.getElementById('taskList');
      container.innerHTML = '';

      const groups = { today: [], week: [], later: [], done: [] };
      tasks.forEach(t => groups[taskGroup(t)].push(t));
      Object.values(groups).forEach(g => g.sort(sortByDate));

      const hasAny = Object.values(groups).some(g => g.length);
      if (!hasAny) {
        container.innerHTML = '<div class="empty-state">No hay tareas aún. Añade algo pequeño y empieza.</div>';
        return;
      }

      if (groups.today.length)  appendGroup(container, 'Hoy',          groups.today,  true);
      if (groups.week.length)   appendGroup(container, 'Esta semana',  groups.week,   false);
      if (groups.later.length)  appendGroup(container, 'Más adelante', groups.later,  false);
      if (groups.done.length)   appendGroup(container, 'Completadas',  groups.done,   false);
    }

    function appendGroup(container, label, taskArr, urgent) {
      const lbl = document.createElement('div');
      lbl.className = 'group-label' + (urgent ? ' urgent' : '');
      lbl.textContent = label;
      container.appendChild(lbl);

      const list = document.createElement('div');
      list.className = 'task-list';
      taskArr.forEach(task => list.appendChild(makeTaskEl(task)));
      container.appendChild(list);
    }

    function makeTaskEl(task) {
      const d = daysDiff(task.dueDate);
      const isUrgent = !task.completed && d !== null && d <= 0;

      const item = document.createElement('div');
      item.className = 'task-item' + (isUrgent ? ' urgent-task' : '');

      const check = document.createElement('div');
      check.className = 'task-check' + (task.completed ? ' done' : '');
      check.addEventListener('click', () => {
        task.completed = !task.completed;
        saveTasks(); renderTasks();
        if (activeSection === 'focus') renderFocus();
      });

      const body = document.createElement('div');
      body.className = 'task-body';

      const title = document.createElement('div');
      title.className = 'task-title' + (task.completed ? ' done-text' : '');
      title.textContent = task.title;
      body.appendChild(title);

      if (task.dueDate) {
        const dt = document.createElement('div');
        dt.className = 'task-date' + (isUrgent ? ' urgent' : '');
        dt.textContent = fmtDate(task.dueDate);
        body.appendChild(dt);
      }

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
      del.addEventListener('click', () => {
        tasks = tasks.filter(t => t.id !== task.id);
        saveTasks(); renderTasks();
        if (activeSection === 'focus') renderFocus();
      });

      item.append(check, body, del);
      return item;
    }

    /* ─── Focus section ─── */
    function urgentTask() {
      return tasks.filter(t => !t.completed).sort(sortByDate)[0] || null;
    }

    function renderFocus() {
      const container = document.getElementById('focusContent');
      container.innerHTML = '';
      const task = urgentTask();

      if (!task) {
        container.innerHTML = '<div class="focus-wrap"><div class="empty-state" style="max-width:360px">Sin tareas pendientes. Disfruta el momento.</div></div>';
        return;
      }

      const d = daysDiff(task.dueDate);
      const isUrgent = d !== null && d <= 0;

      const wrap = document.createElement('div');
      wrap.className = 'focus-wrap';

      const card = document.createElement('div');
      card.className = 'focus-card';

      const eye = document.createElement('div');
      eye.className = 'focus-eyebrow';
      eye.textContent = 'Ahora mismo';

      const ttl = document.createElement('div');
      ttl.className = 'focus-task-title';
      ttl.textContent = task.title;

      card.append(eye, ttl);

      if (task.dueDate) {
        const dt = document.createElement('div');
        dt.className = 'task-date focus-task-date' + (isUrgent ? ' urgent' : '');
        dt.textContent = fmtDate(task.dueDate);
        card.appendChild(dt);
      }

      const actions = document.createElement('div');
      actions.className = 'focus-actions';

      const doneBtn = document.createElement('button');
      doneBtn.className = 'primary-btn';
      doneBtn.textContent = 'Marcar como hecho';
      doneBtn.addEventListener('click', () => {
        task.completed = true;
        saveTasks(); renderTasks(); renderFocus();
      });

      const skipBtn = document.createElement('button');
      skipBtn.className = 'secondary-btn';
      skipBtn.textContent = 'Ver todas las tareas';
      skipBtn.addEventListener('click', () => switchSection('tasks'));

      actions.append(doneBtn, skipBtn);
      card.appendChild(actions);
      wrap.appendChild(card);
      container.appendChild(wrap);
    }

    /* ─── Energy Widget ─── */
    const ENERGY_DATE_KEY  = 'organizaTDA-energy-date';
    const ENERGY_VALUE_KEY = 'organizaTDA-energy-value';

    const ENERGY_LEVELS = {
      low:    { emoji: '🔴', label: 'Baja' },
      medium: { emoji: '🟡', label: 'Media' },
      high:   { emoji: '🟢', label: 'Alta' }
    };

    function energyLoadToday() {
      const today = new Date().toDateString();
      return localStorage.getItem(ENERGY_DATE_KEY) === today
        ? localStorage.getItem(ENERGY_VALUE_KEY)
        : null;
    }

    function energySave(level) {
      localStorage.setItem(ENERGY_DATE_KEY, new Date().toDateString());
      localStorage.setItem(ENERGY_VALUE_KEY, level);
    }

    function energyRender() {
      const widget = document.getElementById('energyWidget');
      if (!widget) return;
      const current = energyLoadToday();
      const info = current ? ENERGY_LEVELS[current] : null;

      widget.classList.remove('energy-low', 'energy-medium', 'energy-high');

      if (info) {
        widget.classList.add('energy-' + current);
        widget.innerHTML = `
          <span class="energy-set-label">Energía hoy</span>
          <span class="energy-set-value">${info.emoji} ${info.label}</span>
          <button class="energy-change-btn" id="energyChangeBtn">Cambiar</button>
        `;
        document.getElementById('energyChangeBtn').addEventListener('click', energyClear);
      } else {
        widget.innerHTML = `
          <span class="energy-question">¿Cómo estás de energía?</span>
          <div class="energy-options">
            <button class="energy-opt-btn" data-level="low">🔴 Baja</button>
            <button class="energy-opt-btn" data-level="medium">🟡 Media</button>
            <button class="energy-opt-btn" data-level="high">🟢 Alta</button>
          </div>
        `;
        widget.querySelectorAll('.energy-opt-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            energySave(btn.dataset.level);
            energyRender();
          });
        });
      }
    }

    function energyClear() {
      localStorage.removeItem(ENERGY_DATE_KEY);
      localStorage.removeItem(ENERGY_VALUE_KEY);
      energyRender();
    }

    /* ─── Focus Mode ─── */
    function focusModeEnter() {
      document.querySelector('.app').classList.add('focus-mode');
    }

    function focusModeExit() {
      document.querySelector('.app').classList.remove('focus-mode');
    }

    function focusModeInit() {
      document.getElementById('focusModeBtn').addEventListener('click', focusModeEnter);
      document.getElementById('focusExitBtn').addEventListener('click', focusModeExit);
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') focusModeExit();
      });
    }

    /* ─── Pomodoro Timer ─── */
    const POMO_CIRC     = 2 * Math.PI * 88;
    const POMO_DATE_KEY  = 'organizaTDA-pomo-date';
    const POMO_COUNT_KEY = 'organizaTDA-pomo-count';

    function pomoLoadCount() {
      const today = new Date().toDateString();
      return localStorage.getItem(POMO_DATE_KEY) === today
        ? (parseInt(localStorage.getItem(POMO_COUNT_KEY)) || 0)
        : 0;
    }

    const pomo = {
      status: 'idle',       // idle | running | paused | finished
      durationSecs: 25 * 60,
      remaining: 25 * 60,
      interval: null,
      count: pomoLoadCount()
    };

    function pomoSaveCount() {
      localStorage.setItem(POMO_DATE_KEY, new Date().toDateString());
      localStorage.setItem(POMO_COUNT_KEY, pomo.count);
    }

    function pomoFmt(secs) {
      return String(Math.floor(secs / 60)).padStart(2, '0') + ':' + String(secs % 60).padStart(2, '0');
    }

    function pomoUpdateUI() {
      const startBtn = document.getElementById('pomoStart');
      const pauseBtn = document.getElementById('pomoPause');
      const resetBtn = document.getElementById('pomoReset');
      const display  = document.getElementById('pomoDisplay');
      const progress = document.getElementById('pomoProgress');
      const countEl  = document.getElementById('pomoCountNum');
      const msgEl    = document.getElementById('pomoMsg');
      const presets  = document.querySelectorAll('.pomo-preset-btn');
      const custom   = document.getElementById('pomoCustom');

      display.textContent = pomoFmt(pomo.remaining);
      countEl.textContent = pomo.count;

      const frac = pomo.durationSecs > 0
        ? (pomo.durationSecs - pomo.remaining) / pomo.durationSecs
        : 0;
      progress.style.strokeDashoffset = POMO_CIRC * frac;

      const isIdle     = pomo.status === 'idle';
      const isRunning  = pomo.status === 'running';
      const isPaused   = pomo.status === 'paused';
      const isFinished = pomo.status === 'finished';

      msgEl.style.visibility = isFinished ? 'visible' : 'hidden';

      startBtn.disabled = isRunning;
      pauseBtn.disabled = !isRunning;
      resetBtn.disabled = isIdle;

      startBtn.textContent = isPaused ? 'Reanudar' : isFinished ? 'Nuevo' : 'Iniciar';

      const canChange = isIdle;
      presets.forEach(b => { b.disabled = !canChange; });
      custom.disabled = !canChange;
    }

    function pomoSetDuration(mins) {
      pomo.durationSecs = mins * 60;
      pomo.remaining    = pomo.durationSecs;
      pomoUpdateUI();
    }

    function pomoStart() {
      if (pomo.status === 'finished') pomo.remaining = pomo.durationSecs;
      pomo.status   = 'running';
      pomo.interval = setInterval(() => {
        pomo.remaining--;
        if (pomo.remaining <= 0) {
          pomo.remaining = 0;
          pomoFinish();
        } else {
          pomoUpdateUI();
        }
      }, 1000);
      pomoUpdateUI();
    }

    function pomoPause() {
      clearInterval(pomo.interval);
      pomo.interval = null;
      pomo.status   = 'paused';
      pomoUpdateUI();
    }

    function pomoReset() {
      clearInterval(pomo.interval);
      pomo.interval  = null;
      pomo.status    = 'idle';
      pomo.remaining = pomo.durationSecs;
      pomoUpdateUI();
    }

    function pomoFinish() {
      clearInterval(pomo.interval);
      pomo.interval = null;
      pomo.status   = 'finished';
      pomo.count++;
      pomoSaveCount();
      pomoUpdateUI();

      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('¡Pomodoro completado!', {
          body: `Llevas ${pomo.count} pomodoro${pomo.count !== 1 ? 's' : ''} hoy. ¡Tómate un descanso!`
        });
      }
    }

    function pomoUpdateNotifBtn() {
      const btn = document.getElementById('pomoNotifBtn');
      if (!btn) return;
      if (!('Notification' in window)) { btn.style.display = 'none'; return; }
      const p = Notification.permission;
      btn.className = 'pomo-notif-btn' + (p === 'granted' ? ' granted' : p === 'denied' ? ' denied' : '');
      btn.textContent = p === 'granted' ? 'Notificaciones activadas ✓'
                      : p === 'denied'  ? 'Notificaciones bloqueadas'
                      : 'Activar notificaciones';
      btn.disabled = p === 'denied';
    }

    function pomoInit() {
      document.getElementById('pomoStart').addEventListener('click', () => {
        if (!['running'].includes(pomo.status)) pomoStart();
      });
      document.getElementById('pomoPause').addEventListener('click', pomoPause);
      document.getElementById('pomoReset').addEventListener('click', pomoReset);

      document.querySelectorAll('.pomo-preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (pomo.status !== 'idle') return;
          document.querySelectorAll('.pomo-preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('pomoCustom').value = '';
          pomoSetDuration(parseInt(btn.dataset.min));
        });
      });

      const customInput = document.getElementById('pomoCustom');
      function applyCustom() {
        const v = parseInt(customInput.value);
        if (v >= 1 && v <= 999) {
          document.querySelectorAll('.pomo-preset-btn').forEach(b => b.classList.remove('active'));
          pomoSetDuration(v);
        }
      }
      customInput.addEventListener('change', applyCustom);
      customInput.addEventListener('keydown', e => { if (e.key === 'Enter') { applyCustom(); customInput.blur(); } });

      document.getElementById('pomoNotifBtn').addEventListener('click', async () => {
        if (!('Notification' in window)) { alert('Tu navegador no soporta notificaciones.'); return; }
        if (Notification.permission !== 'denied') await Notification.requestPermission();
        pomoUpdateNotifBtn();
      });

      pomoUpdateUI();
      pomoUpdateNotifBtn();
    }

    /* ─── Calendar ─── */
    const cal = { view: 'week', refDate: new Date() };

    function calWeekStart(d) {
      const dt = new Date(d);
      const dow = dt.getDay();
      dt.setDate(dt.getDate() - (dow === 0 ? 6 : dow - 1));
      dt.setHours(0, 0, 0, 0);
      return dt;
    }

    function calLocalKey(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function calIsToday(d) {
      const t = new Date();
      return d.getDate() === t.getDate() &&
        d.getMonth() === t.getMonth() &&
        d.getFullYear() === t.getFullYear();
    }

    function calMakeChip(task) {
      const chip = document.createElement('div');
      chip.className = 'cal-chip' + (task.completed ? ' cal-chip-done' : '');
      chip.textContent = task.title;
      chip.title = task.title;
      return chip;
    }

    function calTasksForDate(key) {
      return tasks.filter(t => t.dueDate === key);
    }

    function calRenderWeek() {
      const container = document.getElementById('calWeekView');
      container.innerHTML = '';

      const ws = calWeekStart(cal.refDate);
      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(ws);
        d.setDate(ws.getDate() + i);
        return d;
      });

      const fmt = d => d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
      document.getElementById('calTitle').textContent = fmt(days[0]) + ' – ' + fmt(days[6]);

      const DAY_NAMES = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
      const grid = document.createElement('div');
      grid.className = 'cal-week-grid';

      days.forEach((d, i) => {
        const col = document.createElement('div');
        col.className = 'cal-day-col' + (calIsToday(d) ? ' cal-today' : '');

        const hdr = document.createElement('div');
        hdr.className = 'cal-day-header';
        hdr.innerHTML = `<span class="cal-day-name">${DAY_NAMES[i]}</span><span class="cal-day-num">${d.getDate()}</span>`;
        col.appendChild(hdr);

        calTasksForDate(calLocalKey(d)).forEach(t => col.appendChild(calMakeChip(t)));
        grid.appendChild(col);
      });

      container.appendChild(grid);
    }

    function calMakeMonthCell(d, other) {
      const cell = document.createElement('div');
      cell.className = 'cal-month-cell' +
        (other ? ' cal-other-month' : '') +
        (calIsToday(d) ? ' cal-today' : '');

      const num = document.createElement('span');
      num.className = 'cal-month-num';
      num.textContent = d.getDate();
      cell.appendChild(num);

      const dayTasks = calTasksForDate(calLocalKey(d));
      dayTasks.slice(0, 3).forEach(t => cell.appendChild(calMakeChip(t)));
      if (dayTasks.length > 3) {
        const more = document.createElement('div');
        more.className = 'cal-chip-more';
        more.textContent = '+' + (dayTasks.length - 3);
        cell.appendChild(more);
      }
      return cell;
    }

    function calRenderMonth() {
      const container = document.getElementById('calMonthView');
      container.innerHTML = '';

      const y = cal.refDate.getFullYear();
      const m = cal.refDate.getMonth();

      document.getElementById('calTitle').textContent =
        new Date(y, m, 1).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });

      const grid = document.createElement('div');
      grid.className = 'cal-month-grid';

      ['L', 'M', 'X', 'J', 'V', 'S', 'D'].forEach(n => {
        const h = document.createElement('div');
        h.className = 'cal-month-head';
        h.textContent = n;
        grid.appendChild(h);
      });

      const firstDow = (new Date(y, m, 1).getDay() + 6) % 7;
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const trailing = (7 - ((firstDow + daysInMonth) % 7)) % 7;

      for (let i = 0; i < firstDow; i++) {
        grid.appendChild(calMakeMonthCell(new Date(y, m, i - firstDow + 1), true));
      }
      for (let d = 1; d <= daysInMonth; d++) {
        grid.appendChild(calMakeMonthCell(new Date(y, m, d), false));
      }
      for (let i = 1; i <= trailing; i++) {
        grid.appendChild(calMakeMonthCell(new Date(y, m + 1, i), true));
      }

      container.appendChild(grid);
    }

    function calRender() {
      const wv = document.getElementById('calWeekView');
      const mv = document.getElementById('calMonthView');
      if (cal.view === 'week') {
        wv.style.display = '';
        mv.style.display = 'none';
        calRenderWeek();
      } else {
        wv.style.display = 'none';
        mv.style.display = '';
        calRenderMonth();
      }
    }

    function calInit() {
      document.querySelectorAll('.cal-toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          cal.view = btn.dataset.view;
          document.querySelectorAll('.cal-toggle-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          calRender();
        });
      });

      document.getElementById('calPrev').addEventListener('click', () => {
        if (cal.view === 'week') {
          cal.refDate.setDate(cal.refDate.getDate() - 7);
        } else {
          cal.refDate = new Date(cal.refDate.getFullYear(), cal.refDate.getMonth() - 1, 1);
        }
        calRender();
      });

      document.getElementById('calNext').addEventListener('click', () => {
        if (cal.view === 'week') {
          cal.refDate.setDate(cal.refDate.getDate() + 7);
        } else {
          cal.refDate = new Date(cal.refDate.getFullYear(), cal.refDate.getMonth() + 1, 1);
        }
        calRender();
      });

      document.getElementById('calToday').addEventListener('click', () => {
        cal.refDate = new Date();
        calRender();
      });
    }

    /* ─── Task form ─── */
    document.getElementById('taskForm').addEventListener('submit', e => {
      e.preventDefault();
      const titleEl = document.getElementById('taskTitle');
      const dateEl  = document.getElementById('taskDate');
      const title = titleEl.value.trim();
      if (!title) return;
      tasks.push({
        id: Date.now().toString(),
        title,
        dueDate: dateEl.value || '',
        completed: false,
        createdAt: new Date().toISOString()
      });
      saveTasks();
      titleEl.value = '';
      dateEl.value = '';
      renderTasks();
    });

    /* ─── Dump autosave ─── */
    document.getElementById('brainDump').addEventListener('input', () => {
      localStorage.setItem(STORAGE_DUMP, document.getElementById('brainDump').value);
    });

    /* ─── Init ─── */
    loadTasks();
    loadDump();
    renderTasks();
    energyRender();
    pomoInit();
    focusModeInit();
    calInit();
  </script>
</body>
</html>
